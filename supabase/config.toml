# Edge Function Setup (via Dashboard):
# 1. Go to Supabase Dashboard → Edge Functions
# 2. Click "Create a new function"
# 3. Name: check-due-rules
# 4. Copy code from supabase/functions/check-due-rules/index.ts
# 5. Deploy function
# 6. Go to Settings → Environment Variables:
#    - Add BACKEND_URL (your Render backend URL)
#    - Add CRON_SECRET (optional, if configured in backend)

