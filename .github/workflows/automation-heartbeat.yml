name: Automation Heartbeat
on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger automation heartbeat
        run: |
          echo "🚀 Triggering automation heartbeat at $(date)"
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST ${{ secrets.VERCEL_URL }}/api/automation/heartbeat \
            -H "Authorization: Bearer ${{ secrets.HEARTBEAT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 300 \
            --retry 3 \
            --retry-delay 10)

          # Extract status code from response
          http_status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2)
          response_body=$(echo "$response" | sed '/HTTP_STATUS:/d')

          echo "📡 Response status: $http_status"

          if [ "$http_status" -eq 200 ]; then
            echo "✅ Heartbeat successful"
            echo "📊 Response: $response_body"
          else
            echo "❌ Heartbeat failed with status $http_status"
            echo "📄 Response: $response_body"
            exit 1
          fi
